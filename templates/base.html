<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flask Uygulaması{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="bg-primary text-white py-3">
        <div class="container">
            <h1 class="h3">Flask Uygulaması</h1>
            <nav class="nav">
                <a class="nav-link text-white" href="{{ url_for('index') }}">Ana Sayfa</a>
                <a class="nav-link text-white" href="{{ url_for('about') }}">Hakkında</a>
                <a class="nav-link text-white" href="{{ url_for('contact') }}">İletişim</a>
            </nav>
        </div>
    </header>

    <main class="container py-4">
        {% block content %}
        <p>İçerik buraya gelecek.</p>
        {% endblock %}
    </main>

    <footer class="bg-dark text-white py-3">
        <div class="container text-center">
            <p>&copy; 2024 Flask Uygulaması. Tüm hakları saklıdır.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
